services:
  # === Core Framework ===
  genoma:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      GENOMA_HOST: "0.0.0.0"
      GENOMA_PORT: "8080"
      GENOMA_DB_HOST: postgres
      GENOMA_DB_PORT: "5432"
      GENOMA_DB_USER: genoma
      GENOMA_DB_PASSWORD: genoma
      GENOMA_DB_NAME: genoma
      GENOMA_REDIS_ADDR: redis:6379
      GENOMA_EMBEDDING_URL: http://embeddings:5050
      GENOMA_SANDBOX_IMAGE: genoma-sandbox:latest
      GENOMA_DOCKER_HOST: unix:///var/run/docker.sock
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - genoma-net
    restart: unless-stopped

  # === PostgreSQL with pgvector ===
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: genoma
      POSTGRES_PASSWORD: genoma
      POSTGRES_DB: genoma
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U genoma"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - genoma-net
    restart: unless-stopped

  # === Redis ===
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - genoma-net
    restart: unless-stopped

  # === Sandbox Image Builder ===
  sandbox:
    build:
      context: .
      dockerfile: Dockerfile.sandbox
    image: genoma-sandbox:latest
    entrypoint: ["echo", "sandbox image built"]

  # === Embeddings Micro-service ===
  embeddings:
    build:
      context: ./embeddings
      dockerfile: Dockerfile
    ports:
      - "5050:5050"
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5050/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
    networks:
      - genoma-net
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:

networks:
  genoma-net:
    driver: bridge
